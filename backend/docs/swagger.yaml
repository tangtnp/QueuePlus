basePath: /api/v1
definitions:
  handlers.CreateQueueInput:
    properties:
      branchId:
        type: string
      customerName:
        type: string
      serviceId:
        type: string
    type: object
  handlers.CreateServiceInput:
    properties:
      branchId:
        type: string
      description:
        type: string
      durationMins:
        type: integer
      name:
        type: string
      tags:
        items:
          type: string
        type: array
    type: object
  handlers.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  handlers.RegisterInput:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
      role:
        type: string
    type: object
  handlers.UpdateQueueStatusInput:
    properties:
      status:
        type: string
    type: object
  models.Branch:
    properties:
      id:
        type: string
      location:
        type: string
      name:
        type: string
      phone:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: tangtnp@example.com
    name: Tang Tanathorn
  description: |-
    QueuePlus backend API for queue management system.
    This API provides authentication, branch management, service management, and queue operations.
  license:
    name: MIT
  title: QueuePlus API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login user and set JWT in HttpOnly cookie
      parameters:
      - description: Login input
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "429":
          description: Too Many Requests
          schema:
            additionalProperties: true
            type: object
      summary: Login user
      tags:
      - Auth
  /auth/logout:
    post:
      description: Logout current user and blacklist current token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Logout user
      tags:
      - Auth
  /auth/me:
    get:
      description: Get current authenticated user from session token
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Current user
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Register a new user with hashed password
      parameters:
      - description: Register input
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.RegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      summary: Register user
      tags:
      - Auth
  /branches:
    get:
      description: Get all branches
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List branches
      tags:
      - Branches
    post:
      consumes:
      - application/json
      description: Create a new branch
      parameters:
      - description: Branch payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.Branch'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create branch
      tags:
      - Branches
  /branches/{id}:
    delete:
      description: Hard delete branch by ID
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete branch
      tags:
      - Branches
    get:
      description: Get a single branch by its ID
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get branch by ID
      tags:
      - Branches
    put:
      consumes:
      - application/json
      description: Update branch by ID
      parameters:
      - description: Branch ID
        in: path
        name: id
        required: true
        type: string
      - description: Branch payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.Branch'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update branch
      tags:
      - Branches
  /dashboard/queue-stats:
    get:
      description: Get queue statistics using MongoDB aggregation pipeline
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Queue dashboard stats
      tags:
      - Dashboard
  /external/posts:
    get:
      description: Fetch posts from an external API and transform the response
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "502":
          description: Bad Gateway
          schema:
            additionalProperties: true
            type: object
      summary: External posts
      tags:
      - External
  /health:
    get:
      description: Check whether QueuePlus backend is running
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Health check
      tags:
      - Monitor
  /monitor/runtime:
    get:
      description: Get Go runtime metrics such as goroutines, memory usage, and GC
        stats
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Runtime monitor
      tags:
      - Monitor
  /monitor/system:
    get:
      description: Get basic system information from the running server
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: System monitor
      tags:
      - Monitor
  /queues:
    get:
      description: Get queues with filtering, pagination, and sorting
      parameters:
      - description: Branch ID
        in: query
        name: branchId
        type: string
      - description: Service ID
        in: query
        name: serviceId
        type: string
      - description: Queue status
        in: query
        name: status
        type: string
      - description: Page number
        in: query
        name: page
        type: integer
      - description: Items per page
        in: query
        name: limit
        type: integer
      - description: Sort field
        in: query
        name: sortBy
        type: string
      - description: asc or desc
        in: query
        name: sortOrder
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: List queues
      tags:
      - Queues
    post:
      consumes:
      - application/json
      description: Create a new queue for a customer under a branch and service
      parameters:
      - description: Queue payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateQueueInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Create queue
      tags:
      - Queues
  /queues/{id}:
    get:
      description: Get a single queue by ID
      parameters:
      - description: Queue ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get queue by ID
      tags:
      - Queues
  /queues/{id}/status:
    patch:
      consumes:
      - application/json
      description: Update queue status such as waiting, serving, done, or cancelled
      parameters:
      - description: Queue ID
        in: path
        name: id
        required: true
        type: string
      - description: Queue status payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateQueueStatusInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update queue status
      tags:
      - Queues
  /services:
    get:
      description: Get all non-deleted services, optionally filtered by branchId
      parameters:
      - description: Branch ID
        in: query
        name: branchId
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: List services
      tags:
      - Services
    post:
      consumes:
      - application/json
      description: Create a new service under a branch
      parameters:
      - description: Service payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateServiceInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create service
      tags:
      - Services
  /services/{id}:
    delete:
      description: Soft delete service by setting isDeleted=true
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Soft delete service
      tags:
      - Services
    get:
      description: Get a single non-deleted service by ID
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get service by ID
      tags:
      - Services
    put:
      consumes:
      - application/json
      description: Update a non-deleted service by ID
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: string
      - description: Service payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateServiceInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update service
      tags:
      - Services
  /services/{id}/hard:
    delete:
      description: Permanently delete service by ID
      parameters:
      - description: Service ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Hard delete service
      tags:
      - Services
  /services/search/by-tags:
    get:
      description: Search non-deleted services using MongoDB $all operator on tags
      parameters:
      - collectionFormat: multi
        description: Tags
        in: query
        items:
          type: string
        name: tags
        required: true
        type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Search services by tags
      tags:
      - Services
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
